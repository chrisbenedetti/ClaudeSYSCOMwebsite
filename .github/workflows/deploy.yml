name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Which variant to deploy'
        required: true
        default: 'techforward'
        type: choice
        options:
          - techforward
          - govfriendly
          - premium

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build selected variant
        run: |
          VARIANT="${{ github.event.inputs.variant || 'techforward' }}"
          npm run build:${VARIANT}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/${{ github.event.inputs.variant || 'techforward' }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
